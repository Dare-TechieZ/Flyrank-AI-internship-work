openapi: 3.0.0

info:
  title: Task API
  version: 1.0.0

servers:
  - url: http://localhost:3000

paths:
  /tasks:
    get:
      summary: Get all tasks
      responses:
        '200':
          description: Success

    post:
      summary: Create a new task
      responses:
        '201':
          description: Task created

  /tasks/{id}:
    get:
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success

    put:
      summary: Update task
      responses:
        '200':
          description: Updated

    delete:
      summary: Delete task
      responses:
        '204':
          description: Deleted